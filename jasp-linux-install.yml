---
- name: Install JASP Statistical Software for SURF Workspace
  hosts: localhost
  gather_facts: true
  become: true

  tasks:
    - name: Ensure Flatpak is installed via system packages
      ansible.builtin.package:
        name: flatpak
        state: present

    - name: Ensure Flathub repository remote is added
      community.general.flatpak_remote:
        name: flathub
        state: present
        method: system
        url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: Install JASP via Flatpak
      community.general.flatpak:
        name: org.jaspstats.JASP
        state: present
        method: system
